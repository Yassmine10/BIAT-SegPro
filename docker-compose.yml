version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: biat_segpro_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biat_segpro
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biat_segpro"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biat_segpro_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/biat_segpro
      - JWT_SECRET_KEY=biat_segpro_super_secret_jwt_signing_key_2026
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - BACKEND_CORS_ORIGINS=["http://localhost:3000", "http://localhost:3001"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biat_segpro_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
